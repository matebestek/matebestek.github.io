  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fdiv>\n        <h1 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: clamp(38px, 5.8vw, 70px); line-height: 1.04; letter-spacing: -.02em; margin: 0 0 26px; text-wrap: balance;\">Connecting people, technology &amp; the life&nbsp;sciences.<\u002Fh1>\n        <p style=\"font-size: clamp(17px, 1.5vw, 20px); line-height: 1.62; color: color-mix(in srgb, var(--ink, #20262b) 82%, transparent); max-width: 38ch; margin: 0 0 34px;\">Two decades building national eHealth systems, healthcare interoperability, and AI for cancer screening — across Slovenia and the European Union.<\u002Fp>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 12px;\">\n          <a href=\"mailto:mate.bestek@gmail.com\" style=\"display: inline-flex; align-items: center; gap: 9px; padding: 12px 22px; background: var(--accent, #285a64); color: #f7f4ee; text-decoration: none; border-radius: 999px; font-weight: 600; font-size: 15px;\" style-hover=\"filter:brightness(1.08)\">Email me<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/matebestek\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-flex; align-items: center; gap: 9px; padding: 12px 22px; background: transparent; color: var(--ink, #20262b); text-decoration: none; border: 1px solid var(--line, rgba(32,38,43,.12)); border-radius: 999px; font-weight: 600; font-size: 15px;\" style-hover=\"border-color:var(--accent,#285a64)\">LinkedIn<\u002Fa>\n          <a href=\"assets/Mate-Bestek-CV.pdf\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-flex; align-items: center; gap: 9px; padding: 12px 22px; background: transparent; color: var(--ink, #20262b); text-decoration: none; border: 1px solid var(--line, rgba(32,38,43,.12)); border-radius: 999px; font-weight: 600; font-size: 15px;\" style-hover=\"border-color:var(--accent,#285a64)\">Download CV ↓<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ portrait }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"posi -spacing: -.02em;\">35<\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted, #6f6f66); margin-top: 12px;\">Publications<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family: 'Spectral', serif; font-size: clamp(30px, 3.4vw, 42px); font-weight: 500; line-height: 1; letter-spacing: -.02em;\">60<\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted, #6f6f66); margin-top: 12px;\">Largest team led<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ABOUT -->\n  <section id=\"about\" style=\"max-width: 1180px; margin: 0 auto; padding: clamp(48px, 8vw, 110px) clamp(20px, 6vw, 100px);\">\n    <div style=\"display: grid; grid-template-columns: minmax(0, 280px) minmax(0, 1fr); gap: clamp(28px, 5vw, 80px);\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent, #285a64); padding-top: 12px;\">01 — About<\u002Fdiv>\n      <div>\n        <p style=\"font-family: 'Spectral', serif; font-weight: 400; font-size: clamp(22px, 2.4vw, 30px); line-height: 1.42; letter-spacing: -.01em; margin: 0 0 28px; text-wrap: pretty;\">Driven by curiosity — an explorer of reality with a strong sense for people, technology and the life sciences, and the ability to listen, structure, innovate, and finish what was started.<\u002Fp>\n        <p style=\"font-size: 18px; line-height: 1.66; color: color-mix(in srgb, var(--ink, #20262b) 84%, transparent); margin: 0 0 18px; max-width: 60ch;\">A highly creative person who enjoys connections in life — between people or concepts — that can be very diverse, thanks to an inherent interdisciplinarity. My work sits where healthcare, technology, policy and human behaviour meet.<\u002Fp>\n        <p style=\"font-size: 18px; line-height: 1.66; color: color-mix(in srgb, var(--ink, #20262b) 84%, transparent); margin: 0; max-width: 60ch;\">I also love to travel and grow more sensitive to different cultures. My close family communicates in five languages — together with a love for music and art, this cultural diversity is a big part of who I am.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WORK -->\n  <section id=\"work\" style=\"background: color-mix(in srgb, var(--ink, #20262b) 4%, var(--paper, #f5f1e8)); border-top: 1px solid var(--line, rgba(32,38,43,.12)); border-bottom: 1px solid var(--line, rgba(32,38,43,.12));\">\n    <div style=\"max-width: 1180px; margin: 0 auto; padding: clamp(48px, 8vw, 110px) clamp(20px, 6vw, 100px);\">\n      <div style=\"display: grid; grid-template-columns: minmax(0, 280px) minmax(0, 1fr); gap: clamp(28px, 5vw, 80px);\">\n        <div>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent, #285a64);\">02 — Experience<\u002Fdiv>\n          <h2 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: clamp(28px, 3.2vw, 40px); line-height: 1.08; letter-spacing: -.02em; margin: 18px 0 0;\">Selected roles<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column;\">\n\n          <div style=\"display: grid; grid-template-columns: 130px minmax(0,1fr); gap: clamp(16px, 3vw, 40px); padding: 30px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--muted, #6f6f66); padding-top: 5px;\">2024 — now<\u002Fdiv>\n            <div>\n              <h3 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: 23px; letter-spacing: -.01em; margin: 0 0 4px;\">Scientific Associate<\u002Fh3>\n              <div style=\"font-size: 15px; color: var(--accent, #285a64); font-weight: 600; margin-bottom: 12px;\">Institute of Oncology Ljubljana<\u002Fdiv>\n              <p style=\"font-size: 16.5px; line-height: 1.62; color: color-mix(in srgb, var(--ink, #20262b) 82%, transparent); margin: 0; max-width: 58ch;\">Leading R&amp;D for the national cervical-cancer screening information system into production, and applying AI in cancer screening — machine learning for missing &amp; synthetic data, LLM/RAG systems over registry data, and a “clinical agent” predicting next steps for women. Representing the institute in European networks on AI in screening.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: grid; grid-template-columns: 130px minmax(0,1fr); gap: clamp(16px, 3vw, 40px); padding: 30px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--muted, #6f6f66); padding-top: 5px;\">2020 — 2024<\u002Fdiv>\n            <div>\n              <h3 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: 23px; letter-spacing: -.01em; margin: 0 0 4px;\">Head of MedTech &amp; Digital Healthcare<\u002Fh3>\n              <div style=\"font-size: 15px; color: var(--accent, #285a64); font-weight: 600; margin-bottom: 12px;\">3fs — for Getinge AB, Stockholm<\u002Fdiv>\n              <p style=\"font-size: 16.5px; line-height: 1.62; color: color-mix(in srgb, var(--ink, #20262b) 82%, transparent); margin: 0; max-width: 58ch;\">Defined interoperability strategy for an ICU medical-device supplier — vision, tactics and product innovation to make interoperability part of every product team, reducing complexity across hospital environments.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: grid; grid-template-columns: 130px minmax(0,1fr); gap: clamp(16px, 3vw, 40px); padding: 30px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--muted, #6f6f66); padding-top: 5px;\">2015 — 2019<\u002Fdiv>\n            <div>\n              <h3 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: 23px; letter-spacing: -.01em; margin: 0 0 4px;\">Head, Centre for Healthcare Informatics<\u002Fh3>\n              <div style=\"font-size: 15px; color: var(--accent, #285a64); font-weight: 600; margin-bottom: 12px;\">National Institute of Public Health (NIJZ), Slovenia<\u002Fdiv>\n              <p style=\"font-size: 16.5px; line-height: 1.62; color: color-mix(in srgb, var(--ink, #20262b) 82%, transparent); margin: 0; max-width: 58ch;\">National expert leading a centre of 35 people on eHealth and telemedicine — interoperability (IHE, openEHR, SNOMED, Continua), cross-border patient-data exchange, and EU projects including the eHealth Joint Action, CEF SI-PASS (eID/eIDAS) and the national EHR.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: grid; grid-template-columns: 130px minmax(0,1fr); gap: clamp(16px, 3vw, 40px); padding: 30px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--muted, #6f6f66); padding-top: 5px;\">2014 — 2015<\u002Fdiv>\n            <div>\n              <h3 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: 23px; letter-spacing: -.01em; margin: 0 0 4px;\">Senior Government Official &amp; Project Manager<\u002Fh3>\n              <div style=\"font-size: 15px; color: var(--accent, #285a64); font-weight: 600; margin-bottom: 12px;\">Ministry of Health of the Republic of Slovenia<\u002Fdiv>\n              <p style=\"font-size: 16.5px; line-height: 1.62; color: color-mix(in srgb, var(--ink, #20262b) 82%, transparent); margin: 0; max-width: 58ch;\">Subject-matter expert and project manager on the National eHealth Project — turning the founding specifications and documents into real national information infrastructure, with custody of the standards (openEHR, IHE) still in use today.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: grid; grid-template-columns: 130px minmax(0,1fr); gap: clamp(16px, 3vw, 40px); padding: 30px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12)); border-bottom: 1px solid var(--line, rgba(32,38,43,.12));\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--muted, #6f6f66); padding-top: 5px;\">2003 — 2014<\u002Fdiv>\n            <div>\n              <h3 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: 23px; letter-spacing: -.01em; margin: 0 0 4px;\">Architect, Project &amp; Engineering Lead<\u002Fh3>\n              <div style=\"font-size: 15px; color: var(--accent, #285a64); font-weight: 600; margin-bottom: 12px;\">Univ. of Primorska · SRC.SI · Medius · epSOS / PARENT<\u002Fdiv>\n              <p style=\"font-size: 16.5px; line-height: 1.62; color: color-mix(in srgb, var(--ink, #20262b) 82%, transparent); margin: 0; max-width: 58ch;\">A decade leading software engineering and architecture across e-government and EU healthcare projects — chief architect on national eCare research (teams up to 60), cross-border patient data in epSOS, and the European patient-registry network PARENT.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOCUS -->\n  <section id=\"focus\" style=\"max-width: 1180px; margin: 0 auto; padding: clamp(48px, 8vw, 110px) clamp(20px, 6vw, 100px);\">\n    <div style=\"display: grid; grid-template-columns: minmax(0, 280px) minmax(0, 1fr); gap: clamp(28px, 5vw, 80px);\">\n      <div>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent, #285a64);\">03 — Focus<\u002Fdiv>\n        <h2 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: clamp(28px, 3.2vw, 40px); line-height: 1.08; letter-spacing: -.02em; margin: 18px 0 0;\">What I work on<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--line, rgba(32,38,43,.12)); border: 1px solid var(--line, rgba(32,38,43,.12));\">\n\n        <div style=\"background: var(--paper, #f5f1e8); padding: 28px clamp(20px,2.4vw,30px);\" style-hover=\"background:color-mix(in srgb, var(--accent,#285a64) 5%, var(--paper,#f5f1e8))\">\n          <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; margin-bottom: 10px;\">Healthcare interoperability<\u002Fdiv>\n          <p style=\"font-size: 15.5px; line-height: 1.55; color: var(--muted, #6f6f66); margin: 0;\">Designing systems that speak to one another — IHE, openEHR, HL7, SNOMED and Continua at national scale.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: var(--paper, #f5f1e8); padding: 28px clamp(20px,2.4vw,30px);\" style-hover=\"background:color-mix(in srgb, var(--accent,#285a64) 5%, var(--paper,#f5f1e8))\">\n          <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; margin-bottom: 10px;\">AI in cancer screening<\u002Fdiv>\n          <p style=\"font-size: 15.5px; line-height: 1.55; color: var(--muted, #6f6f66); margin: 0;\">Machine learning, synthetic data, LLM/RAG systems and clinical agents applied to real screening programmes.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: var(--paper, #f5f1e8); padding: 28px clamp(20px,2.4vw,30px);\" style-hover=\"background:color-mix(in srgb, var(--accent,#285a64) 5%, var(--paper,#f5f1e8))\">\n          <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; margin-bottom: 10px;\">National eHealth &amp; governance<\u002Fdiv>\n          <p style=\"font-size: 15.5px; line-height: 1.55; color: var(--muted, #6f6f66); margin: 0;\">Architecture, standards, and governance of common eHealth artefacts, databases and services on the national level.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: var(--paper, #f5f1e8); padding: 28px clamp(20px,2.4vw,30px);\" style-hover=\"background:color-mix(in srgb, var(--accent,#285a64) 5%, var(--paper,#f5f1e8))\">\n          <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; margin-bottom: 10px;\">Cross-border health data<\u002Fdiv>\n          <p style=\"font-size: 15.5px; line-height: 1.55; color: var(--muted, #6f6f66); margin: 0;\">Patient-summary exchange across EU member states — epSOS, CEF and eIDAS-aligned national contact points.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: var(--paper, #f5f1e8); padding: 28px clamp(20px,2.4vw,30px);\" style-hover=\"background:color-mix(in srgb, var(--accent,#285a64) 5%, var(--paper,#f5f1e8))\">\n          <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; margin-bottom: 10px;\">Health data semantics<\u002Fdiv>\n          <p style=\"font-size: 15.5px; line-height: 1.55; color: var(--muted, #6f6f66); margin: 0;\">Doctoral research on democratizing and commoning semantic interoperability for sustainable health systems.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: var(--paper, #f5f1e8); padding: 28px clamp(20px,2.4vw,30px);\" style-hover=\"background:color-mix(in srgb, var(--accent,#285a64) 5%, var(--paper,#f5f1e8))\">\n          <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; margin-bottom: 10px;\">Socio-technical leadership<\u002Fdiv>\n          <p style=\"font-size: 15.5px; line-height: 1.55; color: var(--muted, #6f6f66); margin: 0;\">Managing change, risk and stakeholders on high-stakes healthcare programmes, with teams of up to 60 people.<\u002Fp>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PUBLICATIONS -->\n  <section id=\"publications\" style=\"background: color-mix(in srgb, var(--ink, #20262b) 4%, var(--paper, #f5f1e8)); border-top: 1px solid var(--line, rgba(32,38,43,.12)); border-bottom: 1px solid var(--line, rgba(32,38,43,.12));\">\n    <div style=\"max-width: 1180px; margin: 0 auto; padding: clamp(48px, 8vw, 110px) clamp(20px, 6vw, 100px);\">\n      <div style=\"display: grid; grid-template-columns: minmax(0, 280px) minmax(0, 1fr); gap: clamp(28px, 5vw, 80px);\">\n        <div>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent, #285a64);\">04 — Research<\u002Fdiv>\n          <h2 style=\"font-family: 'Spectral', serif; font-weight: 500; font-size: clamp(28px, 3.2vw, 40px); line-height: 1.08; letter-spacing: -.02em; margin: 18px 0 16px;\">Selected publications<\u002Fh2>\n          <p style=\"font-size: 15px; line-height: 1.55; color: var(--muted, #6f6f66); margin: 0;\">A selection from 35 peer-reviewed papers, chapters and a doctoral thesis.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column;\">\n\n          <a href=\"https://thecommonsjournal.org/articles/10.5334/ijc.1157\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration: none; color: inherit; display: block; padding: 26px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\" style-hover=\"opacity:.62\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent, #285a64); margin-bottom: 9px;\">2022 · The International Journal of the Commons<\u002Fdiv>\n            <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; line-height: 1.3; letter-spacing: -.01em;\">Commoning semantic interoperability in healthcare<\u002Fdiv>\n          <\u002Fa>\n\n          <a href=\"https://link.springer.com/chapter/10.1007/978-3-031-34586-9_24\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration: none; color: inherit; display: block; padding: 26px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\" style-hover=\"opacity:.62\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent, #285a64); margin-bottom: 9px;\">2023 · Springer (PervasiveHealth, LNICST 488)<\u002Fdiv>\n            <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; line-height: 1.3; letter-spacing: -.01em;\">Health data semantics: exploring requirements for sustainable health systems<\u002Fdiv>\n          <\u002Fa>\n\n          <a href=\"https://aci.schattauer.de/en/contents/archive/issue/2503/issue/special/manuscript/27811/show.html\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration: none; color: inherit; display: block; padding: 26px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\" style-hover=\"opacity:.62\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent, #285a64); margin-bottom: 9px;\">2017 · Applied Clinical Informatics<\u002Fdiv>\n            <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; line-height: 1.3; letter-spacing: -.01em;\">Combining openEHR, SNOMED, IHE and Continua as approaches to interoperability on national eHealth<\u002Fdiv>\n          <\u002Fa>\n\n          <a href=\"https://aime17.aimedicine.info/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration: none; color: inherit; display: block; padding: 26px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12));\" style-hover=\"opacity:.62\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent, #285a64); margin-bottom: 9px;\">2017 · AIME — Artificial Intelligence in Medicine<\u002Fdiv>\n            <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; line-height: 1.3; letter-spacing: -.01em;\">Modelling time-series of glucose measurements from diabetes patients using predictive clustering trees<\u002Fdiv>\n          <\u002Fa>\n\n          <a href=\"https://pure.itu.dk/en/publications/democratizing-health-data-semantics-a-commons-based-technology-en/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration: none; color: inherit; display: block; padding: 26px 0; border-top: 1px solid var(--line, rgba(32,38,43,.12)); border-bottom: 1px solid var(--line, rgba(32,38,43,.12));\" style-hover=\"opacity:.62\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent, #285a64); margin-bottom: 9px;\">2022 · PhD Thesis · IT University of Copenhagen<\u002Fdiv>\n            <div style=\"font-family: 'Spectral', serif; font-size: 21px; font-weight: 500; line-height: 1.3; letter-spacing: -.01em;\">Democratizing health data semantics: a commons-based, technology-enhanced activity space<\u002Fdiv>\n          <\u002Fa>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EDUCATION + LANGUAGES -->\n  <section id=\"education\" style=\"max-width: 1180px; margin: 0 auto; padding: clamp(48px, 8vw, 110px) clamp(20px, 6vw, 100px);\">\n    <div style=\"display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: clamp(40px, 6vw, 90px);\">\n\n      <div>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent, #285a64); margin-bottom: 26px;\">05 — Education<\u002Fdiv>\n        <div style=\"padding-bottom: 22px; margin-bottom: 22px; border-bottom: 1px solid var(--line, rgba(32,38,43,.12));\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted, #6f6f66); margin-bottom: 8px;\">2017 — 2022<\u002Fdiv>\n          <div style=\"font-family: 'Spectral', serif; font-size: 22px; font-weight: 500; letter-spacing: -.01em; margin-bottom: 4px;\">PhD — Health Data Semantics<\u002Fdiv>\n          <div style=\"font-size: 16px; color: color-mix(in srgb, var(--ink,#20262b) 78%, transparent);\">IT University of Copenhagen — interdisciplinary thesis linking computer science, information systems, digital design and political economy.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted, #6f6f66); margin-bottom: 8px;\">2000 — 2007<\u002Fdiv>\n          <div style=\"font-family: 'Spectral', serif; font-size: 22px; font-weight: 500; letter-spacing: -.01em; margin-bottom: 4px;\">BSc — Computer &amp; Information Science<\u002Fdiv>\n          <div style=\"font-size: 16px; color: color-mix(in srgb, var(--ink,#20262b) 78%, transparent);\">University of Ljubljana, Faculty of Computer and Information Science.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent, #285a64); margin-bottom: 26px;\">06 — Languages<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 0;\">\n\n          <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--line, rgba(32,38,43,.12));\">\n            <span style=\"font-family: 'Spectral', serif; font-size: 19px;\">Slovene<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted, #6f6f66);\">Mother tongue<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--line, rgba(32,38,43,.12));\">\n            <span style=\"font-family: 'Spectral', serif; font-size: 19px;\">English<\u002Fspan>\n            <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted, #6f6f66);\">C2 · Proficient<\u002Fspan>\n
